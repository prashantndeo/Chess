<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Currency Converter</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <main>
    <section>
      <div class="Converter-container"> 
        <h1>Currency Converter</h1>

        <div class="input-container">
          <input type="number" placeholder="enter a value" min="1" class="amount" />
          <select aria-label="label for the select" class="fromCurrency">
            <option value="NPR">NPR</option>
            <option value="USD">USD</option>
          </select>
        </div>

        <div class="arrow"><i class="fa-solid fa-arrow-right"></i></div>

        <div class="input-container">
          <input placeholder="currency value" type="number" class="Convertedamount" /> 
          <select aria-label="label for the select"  class="toCurrency">
            <option value="NPR">NPR</option>
            <option value="USD">USD</option>
          </select>
        </div>

        <div class="result">1 USD = 85.86 NPR</div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
